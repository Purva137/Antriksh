<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Antriksh — Eyes on Space</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #globe { position: absolute; inset: 0; width: 100vw; height: 100vh; }

</style>
<link rel="stylesheet" href="responsive.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
  <style>
    #mission-nav {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 240px; z-index: 100;
      background: rgba(4,4,12,0.96);
      border-right: 1px solid rgba(255,255,255,0.07);
      display: flex; flex-direction: column;
      transition: transform 0.35s cubic-bezier(.16,1,.3,1);
      backdrop-filter: blur(14px);
      font-family: 'Space Grotesk', sans-serif;
    }
    #mission-nav.collapsed { transform: translateX(-240px); }

    #nav-toggle {
      position: fixed; top: 50%; left: 240px;
      transform: translateY(-50%);
      z-index: 101; width: 18px; height: 44px;
      background: rgba(252,61,33,.65); border: none;
      color: #fff; cursor: pointer; font-size: 9px;
      border-radius: 0 3px 3px 0;
      transition: left 0.35s cubic-bezier(.16,1,.3,1), background 0.2s;
    }
    #nav-toggle:hover { background: #FC3D21; }
    #nav-toggle.collapsed { left: 0; }

    .nav-header {
      padding: 14px 14px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center;
      justify-content: space-between; flex-shrink: 0;
    }
    .nav-logo-line {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 19px; letter-spacing: .12em; color: #fff;
    }
    .nav-logo-line span { color: #FC3D21; }
    #nav-count {
      font-family: 'Space Mono', monospace;
      font-size: 8px; letter-spacing: .1em;
      color: rgba(255,255,255,.25);
      background: rgba(255,255,255,.05);
      padding: 2px 7px; border-radius: 2px;
    }

    .nav-search { padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,.05); flex-shrink: 0; }
    .nav-search input {
      width: 100%; padding: 6px 10px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08); border-radius: 2px;
      color: #fff; font-family: 'Space Mono', monospace;
      font-size: 9px; letter-spacing: .04em; outline: none;
    }
    .nav-search input:focus { border-color: rgba(252,61,33,.4); }
    .nav-search input::placeholder { color: rgba(255,255,255,.2); }

    .nav-body { flex: 1; overflow-y: auto; padding: 4px 0 20px; }
    .nav-body::-webkit-scrollbar { width: 3px; }
    .nav-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); }

    .nav-category { margin-top: 4px; }
    .nav-cat-label {
      font-family: 'Space Mono', monospace;
      font-size: 7px; letter-spacing: .18em; text-transform: uppercase;
      padding: 8px 14px 3px;
      display: flex; align-items: center; gap: 7px;
    }
    .nav-cat-label::after {
      content: ''; flex: 1; height: 1px;
      background: currentColor; opacity: .18;
    }

    .nav-mission {
      display: flex; align-items: center; gap: 9px;
      padding: 7px 14px; cursor: pointer;
      border-left: 2px solid transparent;
      transition: background .15s, border-left-color .15s;
    }
    .nav-mission:hover { background: rgba(255,255,255,.04); }
    .nav-mission.active {
      background: rgba(252,61,33,.07);
      border-left-color: #FC3D21;
    }
    .nav-mission-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .nav-mission-info { flex: 1; min-width: 0; }
    .nav-mission-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px; line-height: 1; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .nav-mission-meta {
      font-family: 'Space Mono', monospace;
      font-size: 7px; letter-spacing: .07em; text-transform: uppercase;
      color: rgba(255,255,255,.22); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .nav-mission-year {
      font-family: 'Space Mono', monospace;
      font-size: 8px; color: rgba(255,255,255,.15); flex-shrink: 0;
    }

    #mission-panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 520px; z-index: 200; background: #000;
      border-left: 1px solid rgba(255,255,255,.08);
      display: flex; flex-direction: column;
      transform: translateX(520px);
      transition: transform 0.4s cubic-bezier(.16,1,.3,1);
    }
    #mission-panel.open { transform: translateX(0); }
    @media (max-width: 600px) {
      #mission-panel { width: 100vw; transform: translateX(100vw); }
    }

    .panel-topbar {
      height: 44px; flex-shrink: 0;
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: rgba(4,4,12,.98);
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    #panel-title {
      font-family: 'Space Mono', monospace;
      font-size: 9px; letter-spacing: .16em;
      text-transform: uppercase; color: rgba(255,255,255,.35);
    }
    .panel-actions { display: flex; align-items: center; gap: 6px; }
    #panel-popout {
      background: none; border: 1px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.35); font-size: 10px;
      padding: 3px 8px; cursor: pointer; border-radius: 2px;
      font-family: 'Space Mono', monospace; letter-spacing: .06em;
      transition: all .2s;
    }
    #panel-popout:hover { color: #fff; border-color: rgba(255,255,255,.3); }
    #panel-close {
      background: none; border: none;
      color: rgba(255,255,255,.3); font-size: 15px;
      cursor: pointer; padding: 4px 6px; transition: color .2s;
    }
    #panel-close:hover { color: #fff; }

    .rhud-badge::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: #ffaa00; box-shadow: 0 0 6px #ffaa0088;
      animation: pulse 2s infinite;
    }

    #hud {
      position: fixed; bottom: 22px; left: 258px;
      z-index: 50; pointer-events: none;
      display: flex; flex-direction: column; gap: 6px;
      font-family: 'Space Mono', monospace;
    }

    #hud-clock {
      background: rgba(4,4,14,.88);
      border: 1px solid rgba(255,255,255,.07);
      border-left: 2px solid #00c864;
      padding: 8px 14px;
      backdrop-filter: blur(10px);
    }
    .hud-row {
      display: flex; align-items: baseline; gap: 10px; line-height: 1.75;
    }
    .hud-tz {
      font-size: 7px; letter-spacing: .18em; text-transform: uppercase;
      color: rgba(255,255,255,.28); min-width: 34px;
    }
    .hud-time {
      font-size: 13px; letter-spacing: .04em; color: #00c864;
      font-variant-numeric: tabular-nums;
    }
    .hud-date {
      font-size: 7px; letter-spacing: .1em; text-transform: uppercase;
      color: rgba(255,255,255,.2); margin-left: auto;
    }

    #hud-gauge {
      background: rgba(4,4,14,.88);
      border: 1px solid rgba(255,255,255,.07);
      border-left: 2px solid #FC3D21;
      padding: 8px 14px 10px;
      backdrop-filter: blur(10px);
      min-width: 270px;
    }
    .gauge-head {
      font-size: 7px; letter-spacing: .18em; text-transform: uppercase;
      color: rgba(255,255,255,.22); margin-bottom: 4px;
    }
    #gauge-reading {
      display: flex; align-items: baseline; gap: 5px; margin-bottom: 7px;
    }
    #gauge-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px; color: #FC3D21; line-height: 1;
      font-variant-numeric: tabular-nums; letter-spacing: .02em;
    }
    #gauge-unit {
      font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
      color: rgba(255,255,255,.4);
    }
    .gauge-track {
      position: relative; width: 100%; height: 3px;
      background: rgba(255,255,255,.07); border-radius: 1px; overflow: visible;
    }
    .gauge-fill {
      height: 100%; border-radius: 1px;
      background: linear-gradient(90deg,#00c864 0%,#ffaa00 50%,#FC3D21 100%);
      min-width: 2px; transition: width .25s ease;
    }
    .gauge-needle {
      position: absolute; top: -4px;
      width: 2px; height: 11px;
      background: #fff; border-radius: 1px;
      transform: translateX(-50%); transition: left .25s ease;
    }
    .gauge-ticks { position: relative; height: 18px; }
    .gauge-tick {
      position: absolute; bottom: 0; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .gauge-tick-pip {
      width: 1px; height: 4px; background: rgba(255,255,255,.18);
    }
    .gauge-tick-lbl {
      font-size: 6px; letter-spacing: .04em;
      color: rgba(255,255,255,.22); white-space: nowrap;
    }
    #gauge-ref {
      font-size: 7px; letter-spacing: .12em; text-transform: uppercase;
      color: rgba(255,255,255,.18); margin-top: 3px;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/satellite.js@5.0.0/dist/satellite.min.js"></script>

  <script>
    const container = document.getElementById('globe');

    const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    // log missing textures without crashing the render loop
    THREE.DefaultLoadingManager.onError = url =>
      console.warn('[TextureLoader] missing:', url);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.00001, 1e25);
    camera.position.set(35, 18, 50);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.enableZoom = false;

    

const skyTex = new THREE.TextureLoader().load('./textures/8k_stars.jpg');
    const skyMesh = new THREE.Mesh(
      new THREE.SphereGeometry(1e15, 64, 64),
      new THREE.MeshBasicMaterial({ map: skyTex, side: THREE.BackSide, transparent:true, opacity:1 })
    );
    scene.add(skyMesh);

    // load Milky Way GLB and scale it to match the star dome radius
    (function loadMilkyWay() {
      const dracoLoader = new THREE.DRACOLoader();
dracoLoader.setDecoderPath('./draco/');
var loader = new THREE.GLTFLoader();
loader.setDRACOLoader(dracoLoader);
      loader.load('./models/milky_way_galaxy.glb', function(gltf) {
        var mw = gltf.scene;

        var box = new THREE.Box3().setFromObject(mw);
        var center = new THREE.Vector3();
        var size   = new THREE.Vector3();
        box.getCenter(center);
        box.getSize(size);

        // scale longest axis to 2× the star dome radius so it wraps around it
        var maxDim = Math.max(size.x, size.y, size.z);
        var targetSize = 1e14;
        var S = targetSize / maxDim;
        mw.scale.setScalar(S);

        // shift so the model's geometric center lands at the scene origin
        mw.position.set(-center.x * S, -center.y * S, -center.z * S);

        mw.traverse(function(obj) {
          if (obj.isMesh) {
            obj.material.depthWrite = false;
            obj.material.transparent = true;
            obj.material.opacity = 0.0;
            obj.renderOrder = 0;
          }
        });
        scene.add(mw);
        window._milkyWayObj = mw;
      }, undefined, function(e) { console.warn('Milky Way GLB failed:', e); });
    })();

    var sunMesh = new THREE.Mesh(
      new THREE.SphereGeometry(1.5, 64, 64),
      new THREE.MeshBasicMaterial({ map: new THREE.TextureLoader().load('./textures/8k_sun.jpg') })
    );
    sunMesh.name = 'Sun';
    scene.add(sunMesh);

    const sunLight = new THREE.PointLight(0xffffff, 2, 0, 1);
    sunLight.position.set(0, 0, 0);
    scene.add(sunLight);

    // 100k procedural background stars with B-V colour mapping and magnitude-scaled size
    (function buildStarField() {
      const COUNT = 100_000;
      const positions = new Float32Array(COUNT * 3);
      const colors    = new Float32Array(COUNT * 3);
      const sizes     = new Float32Array(COUNT);

      // B-V colour index → RGB via piecewise interpolation
      const BV_TABLE = [
        [-0.40, 0.635, 0.748, 1.000],
        [ 0.00, 0.800, 0.880, 1.000],
        [ 0.30, 1.000, 1.000, 1.000],
        [ 0.58, 1.000, 0.952, 0.880],
        [ 0.81, 1.000, 0.850, 0.720],
        [ 1.40, 1.000, 0.700, 0.420],
        [ 2.00, 1.000, 0.560, 0.140],
      ];

      function getStarPos(ra, dec, dist) {
        const phi = (90 - dec) * (Math.PI / 180);
        const theta = (ra * 15) * (Math.PI / 180); // RA is in hours (0-24), so * 15 for degrees
        return new THREE.Vector3(
          dist * Math.sin(phi) * Math.cos(theta),
          dist * Math.cos(phi),
          dist * Math.sin(phi) * Math.sin(theta)
        );
      }

      function bvToRgb(bv) {
        bv = Math.max(-0.40, Math.min(2.00, bv));
        for (let i = 0; i < BV_TABLE.length - 1; i++) {
          const lo = BV_TABLE[i], hi = BV_TABLE[i + 1];
          if (bv <= hi[0]) {
            const t = (bv - lo[0]) / (hi[0] - lo[0]);
            return [lo[1] + t*(hi[1]-lo[1]), lo[2] + t*(hi[2]-lo[2]), lo[3] + t*(hi[3]-lo[3])];
          }
        }
        return [1, 1, 1];
      }

      // weighted random B-V by realistic spectral-type frequency
      function randomBV() {
        const r = Math.random();
        if (r < 0.0003) return -0.35 + Math.random() * 0.10; // O
        if (r < 0.0013) return -0.25 + Math.random() * 0.25; // B
        if (r < 0.0063) return  0.00 + Math.random() * 0.30; // A
        if (r < 0.0363) return  0.30 + Math.random() * 0.28; // F
        if (r < 0.1363) return  0.58 + Math.random() * 0.23; // G
        if (r < 0.2763) return  0.81 + Math.random() * 0.59; // K
        return  1.40 + Math.random() * 0.60;                 // M
      }

      function bvToAbsMag(bv) {
        if (bv < -0.20) return -4 + Math.random() * 8;  // O/B
        if (bv <  0.00) return  0 + Math.random() * 4;  // late B
        if (bv <  0.30) return  2 + Math.random() * 4;  // A
        if (bv <  0.58) return  3 + Math.random() * 5;  // F
        if (bv <  0.81) return  4 + Math.random() * 4;  // G
        if (bv <  1.40) return  5 + Math.random() * 5;  // K
        return  8 + Math.random() * 8;                  // M
      }

      for (let i = 0; i < COUNT; i++) {
        const u     = Math.random() * 2 - 1;
        const theta = Math.random() * Math.PI * 2;
        const sqr   = Math.sqrt(1 - u * u);
        const r     = (2.5 + 2.5 * Math.random()) * 1e14;
        positions[i*3]   = r * sqr * Math.cos(theta);
        positions[i*3+1] = r * sqr * Math.sin(theta);
        positions[i*3+2] = r * u;

        const bv  = randomBV();
        const rgb = bvToRgb(bv);
        colors[i*3]   = rgb[0];
        colors[i*3+1] = rgb[1];
        colors[i*3+2] = rgb[2];

        // brighter stars (lower absMag) get larger point sizes
        const absMag = bvToAbsMag(bv);
        sizes[i] = Math.max(0.5e12, (5.0 - absMag * 0.22) * 1e12);
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position',  new THREE.BufferAttribute(positions, 3));
      geo.setAttribute('starColor', new THREE.BufferAttribute(colors,    3));
      geo.setAttribute('starSize',  new THREE.BufferAttribute(sizes,     1));

      const mat = new THREE.ShaderMaterial({
        vertexShader: `
          attribute vec3  starColor;
          attribute float starSize;
          varying vec3 vColor;
          void main() {
            vColor = starColor;
            vec4 mvPos    = modelViewMatrix * vec4(position, 1.0);
            gl_PointSize  = starSize * (1000.0 / -mvPos.z);
            gl_Position   = projectionMatrix * mvPos;
          }
        `,
        fragmentShader: `
          varying vec3 vColor;
          void main() {
            float d = length(gl_PointCoord - vec2(0.5));
            if (d > 0.5) discard;
            float alpha = 1.0 - smoothstep(0.25, 0.5, d);
            gl_FragColor = vec4(vColor, alpha);
          }
        `,
        transparent: true,
        depthWrite:  false,
        blending:    THREE.AdditiveBlending,
      });

      scene.add(new THREE.Points(geo, mat));
    })();

    // M31 and M42 as sprites at exact RA/Dec
    (function buildDSO() {
      // equatorial RA/Dec to Three.js cartesian: x=cos(dec)cos(ra), y=sin(dec), z=-cos(dec)sin(ra)
      function raDecToVec3(raDeg, decDeg, dist) {
        const ra  = raDeg  * (Math.PI / 180);
        const dec = decDeg * (Math.PI / 180);
        return new THREE.Vector3(
           Math.cos(dec) * Math.cos(ra) * dist,
           Math.sin(dec)                * dist,
          -Math.cos(dec) * Math.sin(ra) * dist
        );
      }

      function makeGlowTex(r, g, b, size = 256) {
        const c   = document.createElement('canvas');
        c.width   = c.height = size;
        const ctx = c.getContext('2d');
        const cx  = size / 2;
        const grd = ctx.createRadialGradient(cx, cx, 0, cx, cx, cx);
        grd.addColorStop(0.00, `rgba(${r},${g},${b},1.00)`);
        grd.addColorStop(0.20, `rgba(${r},${g},${b},0.80)`);
        grd.addColorStop(0.50, `rgba(${r},${g},${b},0.30)`);
        grd.addColorStop(1.00, `rgba(${r},${g},${b},0.00)`);
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, size, size);
        return new THREE.CanvasTexture(c);
      }

      const DSO = [
        {
          name: 'M31',
          // Andromeda Galaxy — RA 00h 42m 44.3s, Dec +41° 16′ 09″

    const { atmUniforms, earthGroup } = (function buildEarth() {
      const loader = new THREE.TextureLoader();

      // Earth surface
      const earthMesh = new THREE.Mesh(
        new THREE.SphereGeometry(1, 128, 128),
        new THREE.MeshStandardMaterial({
          map:      loader.load('./textures/8k_earth_daymap.jpg'),
          roughness: 1.0,
          metalness: 0.0,
        })
      );

      // uCamPos is updated every frame in animate()
      const uniforms = {
        uSunDir: { value: new THREE.Vector3(1.0, 0.3, 0.0).normalize() },
        uCamPos: { value: camera.position.clone() },
      };

      const atmMesh = new THREE.Mesh(
        new THREE.SphereGeometry(1.025, 128, 128),
        new THREE.ShaderMaterial({
          uniforms,
          vertexShader: `
            varying vec3 vWorldPos;
            varying vec3 vWorldNormal;
            void main() {
              vec4 wp      = modelMatrix * vec4(position, 1.0);
              vWorldPos    = wp.xyz;
              vWorldNormal = normalize(mat3(modelMatrix) * normal);
              gl_Position  = projectionMatrix * viewMatrix * wp;
            }
          `,
          fragmentShader: `
            #define PI 3.14159265359

            uniform vec3 uSunDir;
            uniform vec3 uCamPos;

            varying vec3 vWorldPos;
            varying vec3 vWorldNormal;

            // Rayleigh phase function P(θ) = (3/16π)(1 + cos²θ)
            float phaseRayleigh(float cosA) {
              return (3.0 / (16.0 * PI)) * (1.0 + cosA * cosA);
            }

            void main() {
              vec3 N = normalize(vWorldNormal);
              vec3 V = normalize(uCamPos - vWorldPos); // toward camera
              vec3 L = normalize(uSunDir);             // toward sun

              // Rayleigh β ∝ λ^{-4}: R(680nm):G(550nm):B(440nm)
              // Relative ratios normalised to blue = 1.0
              vec3 betaR = vec3(0.175, 0.408, 1.0);

              // Phase: angle between reversed view ray and sun
              float phase = phaseRayleigh(dot(-V, L));

              // Optical depth: atmosphere is much thicker at the limb
              float cosVN = max(dot(N, V), 0.0);
              float depth = pow(1.0 - cosVN, 5.0);

              // Day / night terminator
              float sunDot  = dot(N, L);
              float dayMask = smoothstep(-0.15, 0.25, sunDot);

              // Rayleigh blue scatter
              vec3 scatter = betaR * phase * depth * dayMask;

              // Sunset / sunrise orange-red band at the terminator
              float twi     = smoothstep(-0.20, 0.0, sunDot) * (1.0 - smoothstep(0.0, 0.25, sunDot));
              vec3 twilight = vec3(1.0, 0.35, 0.05) * twi * depth * 2.0;

              // Faint night-side limb (bent starlight)
              vec3 nightLimb = vec3(0.02, 0.04, 0.10) * depth * (1.0 - dayMask);

              vec3  col   = scatter * 2.5 + twilight + nightLimb;
              float alpha = clamp(depth * (dayMask * 1.2 + twi * 0.8) + depth * 0.04, 0.0, 0.9);

              gl_FragColor = vec4(col, alpha);
            }
          `,
          side:        THREE.FrontSide,
          transparent: true,
          depthWrite:  false,
          blending:    THREE.AdditiveBlending,
        })
      );
      const group = new THREE.Group();
      group.add(earthMesh, atmMesh);
      scene.add(group);

      return { atmUniforms: uniforms, earthGroup: group };
    })();

    var planetOrbitGroups = {}; // name → orbitGroup
    (function buildPlanets() {
      const loader = new THREE.TextureLoader();
      const KM = 1 / (6_371 * 1_000);

      var J2000 = new Date('2000-01-01T12:00:00Z').getTime();
      var daysSinceJ2000 = (Date.now() - J2000) / 86400000;

      // Keplerian elements: L0 = mean longitude at J2000 (deg), n = motion (deg/day)
      const PLANETS = [
        { name:'Mercury', semiMajorKm:57_909_227,  radius:2_439.7,  tex:'./textures/8k_mercury.jpg',       tilt:0.034,  L0:252.251,  n:4.09234 },
        { name:'Venus',   semiMajorKm:108_209_475, radius:6_051.8,  tex:'./textures/8k_venus_surface.jpg', tilt:177.4,  L0:181.979,  n:1.60213,  cloudTex:'./textures/4k_venus_atmosphere.jpg' },
        { name:'Mars',    semiMajorKm:227_943_824, radius:3_389.5,  tex:'./textures/8k_mars.jpg',          tilt:25.19,  L0:355.433,  n:0.52403 },
        { name:'Jupiter', semiMajorKm:778_570_000, radius:69_911.0, tex:'./textures/8k_jupiter.jpg',       tilt:3.13,   L0:34.396,   n:0.08309 },
        { name:'Saturn',  semiMajorKm:1_432_041_000,radius:58_232.0,tex:'./textures/8k_saturn.jpg',        tilt:26.73,  L0:50.077,   n:0.03346, rings:true },
        { name:'Uranus',  semiMajorKm:2_872_500_000,radius:25_362.0,tex:'./textures/2k_uranus.jpg',        tilt:97.77,  L0:314.055,  n:0.01170 },
        { name:'Neptune', semiMajorKm:4_495_100_000,radius:24_622.0,tex:'./textures/2k_neptune.jpg',       tilt:28.32,  L0:304.349,  n:0.00598 },
      ];

      var earthL0 = 100.464, earthN = 0.98561;
      var earthAngle = (earthL0 + earthN * daysSinceJ2000) * Math.PI / 180;
      var earthDist  = 149_598_262 * KM;
      earthGroup.position.set(Math.cos(earthAngle) * earthDist, 0, Math.sin(earthAngle) * earthDist);

      (function() {
        var pts = [];
        for (var i = 0; i <= 128; i++) { var a = i/128*Math.PI*2; pts.push(new THREE.Vector3(Math.cos(a)*earthDist,0,Math.sin(a)*earthDist)); }
        scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE.LineBasicMaterial({ color:0x334455, transparent:true, opacity:0.35, depthWrite:false })));
      })();

      PLANETS.forEach(function(p) {
        var dist   = p.semiMajorKm * KM;
        var radius = p.radius / 6371;
        var angle  = (p.L0 + p.n * daysSinceJ2000) * Math.PI / 180;

        const orbitGroup = new THREE.Group();
        orbitGroup.position.set(Math.cos(angle) * dist, 0, Math.sin(angle) * dist);
        orbitGroup.name = p.name;
        planetOrbitGroups[p.name] = orbitGroup;

        const bodyGroup = new THREE.Group();
        bodyGroup.rotation.z = p.tilt * Math.PI / 180;

        bodyGroup.add(new THREE.Mesh(
          new THREE.SphereGeometry(radius, 64, 64),
          new THREE.MeshLambertMaterial({ map: loader.load(p.tex) })
        ));

        if (p.cloudTex) {
          bodyGroup.add(new THREE.Mesh(
            new THREE.SphereGeometry(radius * 1.005, 64, 64),
            new THREE.MeshLambertMaterial({ map: loader.load(p.cloudTex), transparent:true, opacity:0.75, depthWrite:false })
          ));
        }

        if (p.rings) {
          const rInner = 92_000 / 6371, rOuter = 136_780 / 6371;
          const ringGeo = new THREE.RingGeometry(rInner, rOuter, 128, 1);
          const pos = ringGeo.attributes.position, uv = ringGeo.attributes.uv;
          for (let i = 0; i < pos.count; i++) {
            const x = pos.getX(i), y = pos.getY(i), r = Math.sqrt(x*x+y*y);
            uv.setX(i, (r-rInner)/(rOuter-rInner)); uv.setY(i, 0.5);
          }
          uv.needsUpdate = true;
          const ringTex = loader.load('./textures/8k_saturn_ring_alpha.png');
          const ringMesh = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({ map:ringTex, alphaMap:ringTex, side:THREE.DoubleSide, transparent:true, depthWrite:false, opacity:0.9 }));
          ringMesh.rotation.x = Math.PI / 2;
          bodyGroup.add(ringMesh);
        }

        orbitGroup.add(bodyGroup);
        scene.add(orbitGroup);

        var pts = [];
        for (var i = 0; i <= 128; i++) { var a = i/128*Math.PI*2; pts.push(new THREE.Vector3(Math.cos(a)*dist, 0, Math.sin(a)*dist)); }
        scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE.LineBasicMaterial({ color:0x334455, transparent:true, opacity:0.35, depthWrite:false })));

        orbitGroup.userData.bodyGroup = bodyGroup;
      });

      window._planetUpdate = function() {
        var t = (Date.now() - J2000) / 86400000; // days since J2000
        var ea = (earthL0 + earthN * t) * Math.PI / 180;
        earthGroup.position.set(Math.cos(ea) * earthDist, 0, Math.sin(ea) * earthDist);

        PLANETS.forEach(function(p) {
          var d = p.semiMajorKm * KM;
          var a = (p.L0 + p.n * t) * Math.PI / 180;
          var g = planetOrbitGroups[p.name];
          if (g) g.position.set(Math.cos(a) * d, 0, Math.sin(a) * d);
          // Self-rotation
          var bg = g && g.userData.bodyGroup;
          if (bg) bg.rotation.y += 0.001;
        });
      };
    })();

        const pv = satellite.propagate(satrec, t);

          .add(earthGroup.position);

        if (!satrec) return;

        let   n      = 0;

          const fix = propagateAt(new Date(t0 + i * step));
          if (!fix) continue;
          const p = geoToLocal(fix.lat, fix.lon, fix.alt)
                      .add(earthGroup.position);
          orbitBuf[n * 3]     = p.x;
          orbitBuf[n * 3 + 1] = p.y;
          orbitBuf[n * 3 + 2] = p.z;
          n++;
        }

        orbitGeo.setDrawRange(0, n);
        orbitGeo.computeBoundingSphere();
      }

    (function buildLabels() {

      var _labels = [];

        var el = document.createElement('div');

      function gatherObjects() {
        var objs = [];

        var planetNames = ['Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune'];
        planetNames.forEach(function(pname) {

        var moonObj = scene.getObjectByName('Moon');
        if (moonObj) objs.push({ el: makeLabel('Moon', 'moon'), obj: moonObj, type:'moon' });

        var STAR_R = 5e13;
        var STAR_LABELS = [
          ['Sirius',101.29,-16.72], ['Canopus',95.99,-52.70], ['Vega',279.23,38.78],
          ['Arcturus',213.92,19.18], ['Capella',79.17,45.99], ['Rigel',78.63,-8.20],
          ['Betelgeuse',88.79,7.41], ['Altair',297.70,8.87], ['Aldebaran',68.98,16.51],
          ['Antares',247.35,-26.43], ['Spica',201.30,-11.16], ['Pollux',116.33,28.03],
          ['Deneb',310.36,45.28], ['Regulus',152.09,11.97], ['Polaris',37.95,89.26],
          ['Procyon',114.83,5.22], ['Fomalhaut',344.41,-29.62], ['Achernar',24.43,-57.24],
          ['Sirius A',101.29,-16.72], ['Hadar',210.96,-60.37], ['Acrux',186.65,-63.10],
        ];
        STAR_LABELS.forEach(function(s) {
          var ra = s[1]*Math.PI/180, dec = s[2]*Math.PI/180;
          var pos = new THREE.Vector3(
            STAR_R * Math.cos(dec) * Math.cos(ra),
            STAR_R * Math.sin(dec),
           -STAR_R * Math.cos(dec) * Math.sin(ra)
          );
          var el = makeLabel(s[0], 'star');
          el.dataset.type = 'star';
          objs.push({ el: el, pos: pos, type:'star' });
        });

        return objs;
      }

      var objects = gatherObjects();

      function updateLabels() {
        var W = window.innerWidth, H = window.innerHeight;
        objects.forEach(function(item) {
          var worldPos = item.pos ? item.pos : item.obj.getWorldPosition(_v.clone());
          var proj = worldPos.clone().project(camera);
          var sx = (proj.x *  0.5 + 0.5) * W;
          var sy = (proj.y * -0.5 + 0.5) * H;

          if (proj.z > 1 || sx < -60 || sx > W+60 || sy < -20 || sy > H+20) {
            item.el.style.opacity = '0'; return;
          }

          var show = true;
          if (item.type === 'moon') {
            show = camera.position.distanceTo(worldPos) < 500;
          }
          item.el.style.opacity = show ? '1' : '0';
          item.el.style.left = sx + 'px';
          item.el.style.top  = (sy + 14) + 'px';
        });
      }

      var satLabelDiv = document.createElement('div');
      satLabelDiv.style.cssText = 'position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:51;';
      document.body.appendChild(satLabelDiv);

      var satLabels = [];

      function makeSatLabel(text, color) {
        var el = document.createElement('div');
        var c = color || '#aaffee';
        el.style.cssText = [
          'position:absolute',
          'transform:translate(-50%,0)',
          'font-family:Space Mono,monospace',
          'font-size:7px',
          'letter-spacing:.07em',
          'text-transform:uppercase',
          'color:' + c,
          'text-shadow:0 0 5px ' + c,

          'pointer-events:none',
          'opacity:0',
          'transition:opacity 0.4s',
        ].join(';');
        el.textContent = text;
        satLabelDiv.appendChild(el);
        return el;
      }

      var SAT_LABEL_COLORS = {
        'ISS': '#00c8ff',
        'Hubble Space Telescope': '#ffe878',
        'James Webb Space Telescope': '#64dcff',
        'AstroSat': '#b478ff',
        'XPoSat': '#ff5078',
        'Tiangong Space Station': '#ff5050',
        'Sentinel-6 Michael Freilich': '#50c8ff',
        'Terra (EOS AM-1)': '#50ff8c',
        'Aqua (EOS PM-1)': '#32b4ff',
        'NISAR': '#ffa500',
        'Chandrayaan-2 Orbiter': '#ff8c3c',
        'Aditya-L1': '#ffc832',
        'Pragyan Rover': '#ffdc50',
        'Vikram Lander': '#b4c8ff',
      };

      var SAT_SHORT_NAMES = {
        'ISS': 'ISS',
        'Hubble Space Telescope': 'Hubble',
        'James Webb Space Telescope': 'JWST',
        'AstroSat': 'AstroSat',
        'XPoSat': 'XPoSat',
        'Tiangong Space Station': 'Tiangong',
        'Sentinel-6 Michael Freilich': 'Sentinel-6',
        'Terra (EOS AM-1)': 'Terra',
        'Aqua (EOS PM-1)': 'Aqua',
        'NISAR': 'NISAR',
        'Chandrayaan-2 Orbiter': 'Ch-2',
        'Aditya-L1': 'Aditya-L1',
        'Pragyan Rover': 'Pragyan',
        'Vikram Lander': 'Vikram',
      };

      // retry gathering until all sprites are in the scene
      var _gatherTries = 0;
      function gatherSatLabels() {
        var found = new Set(satLabels.map(function(s){ return s.sprite.uuid; }));
        scene.traverse(function(obj) {
          if (obj.isSprite && obj.userData.satInfo && !found.has(obj.uuid)) {
            var info = obj.userData.satInfo;
            var short = SAT_SHORT_NAMES[info.name] || info.name.split(' ')[0];
            var color = SAT_LABEL_COLORS[info.name] || '#aaffee';
            var el = makeSatLabel(short, color);
            satLabels.push({ el: el, sprite: obj, info: info });
          }
        });
        if (++_gatherTries < 10) setTimeout(gatherSatLabels, 1000);
      }
      setTimeout(gatherSatLabels, 500);

      var _origUpdate = updateLabels;
      updateLabels = function() {
        _origUpdate();
        var W = window.innerWidth, H = window.innerHeight;
        var camDist = camera.position.length();
        var showSats = camDist < 200;
        satLabels.forEach(function(item) {
          if (!item.sprite.parent) { item.el.style.opacity = '0'; return; }
          var worldPos = item.sprite.getWorldPosition(_v.clone());
          var proj = worldPos.clone().project(camera);
          var sx = (proj.x *  0.5 + 0.5) * W;
          var sy = (proj.y * -0.5 + 0.5) * H;
          if (!showSats || proj.z > 1 || sx < -80 || sx > W+80 || sy < -20 || sy > H+20) {
            item.el.style.opacity = '0'; return;
          }
          item.el.style.opacity = '1';
          item.el.style.left = sx + 'px';
          item.el.style.top  = (sy + 10) + 'px';
        });
      };

      window._labelUpdate = updateLabels;
    })();

    // r128 OrbitControls doesn't support zoomToCursor natively, so we implement it here
    (function setupZoom() {
      const _ray = new THREE.Raycaster();
      const _tmp = new THREE.Vector3();

      renderer.domElement.addEventListener('wheel', function(e) {
        e.preventDefault();
        const rect = renderer.domElement.getBoundingClientRect();
        const nx =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
        const ny = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
        _ray.setFromCamera({ x: nx, y: ny }, camera);

        const hits = _ray.intersectObjects(scene.children, true).filter(function(h) {
          return h.object !== skyMesh && !(h.object instanceof THREE.Points);
        });

        var focus = hits.length > 0 ? hits[0].point.clone() : controls.target.clone();

        var delta = Math.abs(e.deltaY) > 100 ? e.deltaY * 0.3 : e.deltaY;
        var factor = e.deltaY > 0 ? 1.0 / (1 - delta * 0.0008) : (1 - Math.abs(delta) * 0.0008);
        factor = Math.max(0.92, Math.min(1.09, factor));

        var AU = 23.48;
        var distAU = camera.position.length() / AU;
        if (distAU < 5) {
          // inside inner solar system: zoom toward cursor and shift orbit target
          camera.position.sub(focus).multiplyScalar(factor).add(focus);
          controls.target.sub(focus).multiplyScalar(factor).add(focus);
        } else {
          // outside — lock target to Sun so the galaxy stays centred
          controls.target.set(0, 0, 0);
          camera.position.sub(focus).multiplyScalar(factor).add(focus);
        }
        controls.update();
      }, { passive: false });

      // Touch pinch-to-zoom (mobile)
      var _pinchDist0 = 0;
      renderer.domElement.addEventListener('touchstart', function(e) {
        if (e.touches.length === 2) {
          _pinchDist0 = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
          );
        }
      }, { passive: true });
      renderer.domElement.addEventListener('touchmove', function(e) {
        if (e.touches.length !== 2) return;
        var dist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        if (_pinchDist0 === 0) { _pinchDist0 = dist; return; }
        var ratio = dist / _pinchDist0;
        _pinchDist0 = dist;
        var factor = ratio > 1 ? Math.max(0.92, 1 / ratio) : Math.min(1.09, 1 / ratio);
        var AU = 23.48;
        var distAU = camera.position.length() / AU;
        if (distAU < 30) {
          camera.position.multiplyScalar(factor);
          controls.target.multiplyScalar(factor);
        } else {
          controls.target.set(0, 0, 0);
          camera.position.multiplyScalar(factor);
        }
        controls.update();
      }, { passive: true });
      renderer.domElement.addEventListener('touchend', function(e) {
        if (e.touches.length < 2) _pinchDist0 = 0;
      }, { passive: true });

      // forward touch taps to the click handlers for planets and satellites
      var _tapX = 0, _tapY = 0;
      renderer.domElement.addEventListener('touchstart', function(e) {
        if (e.touches.length === 1) { _tapX = e.touches[0].clientX; _tapY = e.touches[0].clientY; }
      }, { passive: true });
      renderer.domElement.addEventListener('touchend', function(e) {
        if (e.changedTouches.length !== 1) return;
        var t = e.changedTouches[0];
        var drag = Math.hypot(t.clientX - _tapX, t.clientY - _tapY);
        if (drag > 16) return;
        var sat = window._pickSat && window._pickSat(t.clientX, t.clientY);
        if (sat && window._showSatInfo) {
          window._showSatInfo(sat.userData.satInfo);
          return;
        }
        // fall back to planet meshes via raycaster
        var rect = renderer.domElement.getBoundingClientRect();
        var nx = ((t.clientX - rect.left) / rect.width)  * 2 - 1;
        var ny = -((t.clientY - rect.top)  / rect.height) * 2 + 1;
        var _tRay = new THREE.Raycaster();
        _tRay.setFromCamera({ x: nx, y: ny }, camera);
        var meshes = [];
        scene.traverse(function(obj) { if (obj.isMesh && obj.userData.planetInfo) meshes.push(obj); });
        var pHits = _tRay.intersectObjects(meshes, false);
        if (pHits.length > 0 && window._showSatInfo) {
          window._showSatInfo(pHits[0].object.userData.planetInfo);
        }
      }, { passive: true });
    })();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    (function() {
      var gauge = document.getElementById('hud-gauge');
      if (!gauge) return;
      gauge.style.cursor = 'ns-resize';
      gauge.addEventListener('wheel', function(e) {
        e.preventDefault();
        var factor = e.deltaY > 0 ? 1.08 : 0.93;
        var tgt = controls.target.clone();
        camera.position.sub(tgt).multiplyScalar(factor).add(tgt);
        controls.update();
      }, { passive: false });
      var track = document.querySelector('.gauge-track');
      if (track) {
        track.style.cursor = 'pointer';
        track.addEventListener('click', function(e) {
          var rect = track.getBoundingClientRect();
          var frac = (e.clientX - rect.left) / rect.width;
          var minLog = Math.log10(1/6371), maxLog = Math.log10(9.461e12/6371);
          var targetDist = Math.pow(10, minLog + frac*(maxLog-minLog));
          var dir = camera.position.clone().sub(controls.target).normalize();
          camera.position.copy(controls.target).addScaledVector(dir, targetDist);
          controls.update();
        });
      }
    })();

    (function animate() {
      requestAnimationFrame(animate);
      
      atmUniforms.uCamPos.value.copy(camera.position);
      if (issUpdateFn) issUpdateFn();
      if (window._satUpdateAll) window._satUpdateAll();
      if (hudUpdateFn) hudUpdateFn();
      if (tileUpdateFn) tileUpdateFn();
      if (window._moonUpdate) window._moonUpdate();
      if (window._planetUpdate) window._planetUpdate();
      if (window._labelUpdate) window._labelUpdate();
      // fade the star skybox and Milky Way GLB depending on camera distance
      (function() {
        var dist = camera.position.length();
        var AU = 23.48;
        var distAU = dist / AU;
        // star skybox fades out as the GLB galaxy becomes opaque
        var tSky = Math.min(1, Math.max(0, (distAU - 1) / 200));
        // GLB fades in from 5 AU, fully visible at 12 AU
        var tGLB = Math.min(1, Math.max(0, (distAU - 5) / 7));
        skyMesh.material.opacity = (0.2 + tSky * 0.8) * (1.0 - tGLB * 0.85);
        var tMW = Math.min(1, Math.max(0, (distAU - 5) / 7));
        // hide the star dome once the galaxy is visible — the dome forms a distracting sphere at that scale
        var showStarDome = tMW < 0.1;
        if (window._starDomeMesh) window._starDomeMesh.visible = showStarDome;
        if (window._starGlowSprites) window._starGlowSprites.forEach(function(sp) { sp.visible = showStarDome; });
        var gaugeEl = document.getElementById('hud-gauge');
        if (gaugeEl) gaugeEl.style.opacity = Math.max(0, 1 - tMW * 3).toString();
        var mhint = document.getElementById('milky-hint');
        if (mhint) mhint.style.opacity = Math.max(0, 1 - tMW * 4).toString();
        if (window._milkyWayObj) {
          window._milkyWayObj.traverse(function(obj) {
            if (obj.isMesh) obj.material.opacity = tMW * 0.95;
          });
        }
        if (window._constLines) {
          var constOpacity = Math.max(0, 1.0 - tMW * 2.5);
          window._constLines.forEach(function(l) {
            l.material.opacity = constOpacity;
            l.material.transparent = true;
          });
        }
        var starLabelOpacity = Math.max(0, 1.0 - tMW * 2.0);
        var spaceLabelDiv = document.getElementById('space-labels');
        if (spaceLabelDiv) {
          spaceLabelDiv.querySelectorAll('[data-type="star"]').forEach(function(el) {
            el.style.opacity = starLabelOpacity.toString();
          });
        }
      })();

      if (earthGroup) earthGroup.children[0] && (earthGroup.children[0].rotation.y += 0.0005);
      controls.update();
      renderer.render(scene, camera);
    })();
  </script>

<script>
(function(){
  var btn = document.getElementById('nav-hamburger');
  var ul = document.querySelector('.nav-links');
  if (!btn || !ul) return;
  btn.addEventListener('click', function(){
    btn.classList.toggle('open');
    ul.classList.toggle('mobile-open');
    document.body.style.overflow = ul.classList.contains('mobile-open') ? 'hidden' : '';
  });
  ul.querySelectorAll('li').forEach(function(li){
    if (!li.querySelector('.dropdown')) return;
    li.classList.add('has-dropdown');
    var topLink = li.querySelector(':scope > a');
    var toggle = document.createElement('span');
    toggle.className = 'nav-toggle';
    toggle.textContent = '+';
    if (topLink) topLink.appendChild(toggle);
    topLink && topLink.addEventListener('click', function(e){
      if (window.innerWidth > 768) return;
      e.preventDefault();
      var open = li.classList.toggle('mobile-expanded');
      toggle.textContent = open ? '−' : '+';
    });
  });
  // close menu when a dropdown link is tapped
  ul.querySelectorAll('.dropdown a').forEach(function(a){
    a.addEventListener('click', function(){
      if (window.innerWidth > 768) return;
      btn.classList.remove('open');
      ul.classList.remove('mobile-open');
      document.body.style.overflow = '';
    });
  });
})();
</script>
</body>
</html>
